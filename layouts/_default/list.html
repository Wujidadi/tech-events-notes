{{ define "main" }}
  {{ partial "page-navigation.html" . }}
  {{ if .Content }}
    {{ .Content }}
  {{ else if .Title }}
    <h1>{{ .Title }}</h1>
  {{ end }}

  {{ if .Pages }}
    <ul>
      {{ range .Pages }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
      {{ end }}
    </ul>
  {{ end }}
{{ end }}
