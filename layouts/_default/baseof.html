<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {{- $pageTitle := partial "page-title-text.html" . -}}
  <title>{{ if ne $pageTitle .Site.Title }}{{ $pageTitle }} | {{ end }}{{ .Site.Title }}</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.5;
    }
    .markdown-body {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px;
      word-wrap: break-word;
    }
    .page-layout {
      display: block;
    }
    .page-layout.has-toc {
      position: relative;
    }
    .page-content {
      min-width: 0;
    }
    .page-toc {
      font-size: 0.875rem;
      line-height: 1.45;
      padding: 16px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
    }
    .page-toc h2 {
      margin-top: 0;
      margin-bottom: 12px;
      padding-bottom: 0;
      font-size: 1rem;
      border-bottom: 0;
    }
    .page-toc nav > ul {
      margin-bottom: 0;
      padding-left: 1.5em;
    }
    .page-toc ul ul {
      margin-top: 8px;
    }
    .page-toc li + li {
      margin-top: 0.35em;
    }
    .page-backnav {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #21262d;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 6px 12px;
      color: #c9d1d9;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
    }
    .back-link:hover {
      background: #21262d;
      text-decoration: none;
    }
    .markdown-body h1,
    .markdown-body h2 {
      padding-bottom: 0.3em;
      border-bottom: 1px solid #21262d;
    }
    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4,
    .markdown-body h5,
    .markdown-body h6 {
      margin: 24px 0 16px;
      font-weight: 600;
      line-height: 1.25;
    }
    .markdown-body p,
    .markdown-body ul,
    .markdown-body ol,
    .markdown-body blockquote,
    .markdown-body table,
    .markdown-body pre {
      margin-top: 0;
      margin-bottom: 16px;
    }
    .markdown-body ul,
    .markdown-body ol {
      padding-left: 2em;
    }
    .markdown-body li + li {
      margin-top: 0.25em;
    }
    .markdown-body a {
      color: #58a6ff;
      text-decoration: none;
    }
    .markdown-body a:hover {
      text-decoration: underline;
    }
    .markdown-body hr {
      height: 0.25em;
      margin: 24px 0;
      padding: 0;
      background: #21262d;
      border: 0;
    }
    .markdown-body blockquote {
      margin-left: 0;
      padding: 0 1em;
      color: #8b949e;
      border-left: 0.25em solid #30363d;
    }
    .markdown-body table {
      display: block;
      width: max-content;
      max-width: 100%;
      overflow: auto;
      border-spacing: 0;
      border-collapse: collapse;
    }
    .markdown-body th,
    .markdown-body td {
      padding: 6px 13px;
      border: 1px solid #30363d;
    }
    .markdown-body tr {
      background: #0d1117;
      border-top: 1px solid #21262d;
    }
    .markdown-body tr:nth-child(2n) {
      background: #161b22;
    }
    .markdown-body code,
    .markdown-body pre {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .markdown-body code {
      padding: 0.2em 0.4em;
      font-size: 85%;
      background: rgba(110, 118, 129, 0.4);
      border-radius: 6px;
    }
    .markdown-body pre {
      padding: 16px;
      overflow: auto;
      font-size: 85%;
      line-height: 1.45;
      background: #161b22;
      border-radius: 6px;
    }
    .markdown-body pre code {
      padding: 0;
      background: transparent;
      border-radius: 0;
    }
    .markdown-body img {
      max-width: 100%;
      height: auto;
    }
    @media (min-width: 1600px) {
      .page-toc {
        position: fixed;
        top: 24px;
        left: calc(50vw - 490px - 292px);
        width: 260px;
        max-height: calc(100vh - 48px);
        overflow: auto;
        scrollbar-gutter: stable;
      }
    }
    @media (max-width: 767px) {
      .markdown-body {
        padding: 24px 16px;
      }
      .page-toc {
        margin-bottom: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="markdown-body">
    {{ block "main" . }}{{ end }}
  </main>
</body>
</html>
